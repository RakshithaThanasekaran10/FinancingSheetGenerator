<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Finance Sheet Generator{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap for basic layout -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">FinanceSheet</a>
    </div>
</nav>

<!-- Main Layout -->
<div class="container mt-4">
    <div class="row">

        <!-- Sidebar / Options -->
        <div class="col-md-3">
            {% block sidebar %}
            <!-- Placeholder for user inputs / options -->
            <div class="card p-3">
                <h5>Options</h5>
                <p>Input fields, filters, or controls go here.</p>
            </div>
            {% endblock %}
        </div>

        <!-- Main Content -->
        <div class="col-md-9">
            {% block content %}
            <!-- Placeholder for generated finance sheet / charts -->
            <div class="card p-3">
                <h5>Generated Sheet</h5>
                <p>Your results will appear here.</p>
            </div>
            {% endblock %}
        </div>

    </div>
</div>

<!-- Footer -->
<footer class="bg-light text-center py-3 mt-4">
    <small>&copy; {% now "Y" %} Finance Sheet Generator</small>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
