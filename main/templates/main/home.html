{% extends "main/base.html" %}

{% block title %}Finance Sheet Generator{% endblock %}

{% block sidebar %}
<div class="card p-3 shadow-sm">
    <h5 class="mb-3">Input Options</h5>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Monthly Income</label>
            <input type="number"
                   step="0.01"
                   name="income"
                   id="income"
                   class="form-control"
                   placeholder="Enter income"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Monthly Expenses</label>
            <input type="number"
                   step="0.01"
                   name="expenses"
                   id="expenses"
                   class="form-control"
                   placeholder="Enter expenses"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Mortgage Rate (%)</label>
            <input type="number"
                   step="0.01"
                   name="rate"
                   class="form-control"
                   placeholder="Enter mortgage rate"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">MLS Number</label>
            <input type="text"
                   name="mls"
                   class="form-control"
                   placeholder="Enter MLS number"
                   required>
        </div>

        <button type="submit" class="btn btn-primary w-100">
            Generate Financing Sheet PDF
        </button>
    </form>
</div>
{% endblock %}



{% block content %}
<div class="card p-4 shadow-sm">
    <h5 class="mb-3">Live Financing Preview</h5>

    <table class="table">
        <thead>
            <tr>
                <th>Category</th>
                <th>Amount</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Income</td>
                <td>$<span id="preview-income">0.00</span></td>
            </tr>
            <tr>
                <td>Expenses</td>
                <td>$<span id="preview-expenses">0.00</span></td>
            </tr>
            <tr>
                <td><strong>Balance</strong></td>
                <td>
                    <strong>
                        $<span id="preview-balance">0.00</span>
                    </strong>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    const incomeInput = document.getElementById("income");
    const expensesInput = document.getElementById("expenses");

    const previewIncome = document.getElementById("preview-income");
    const previewExpenses = document.getElementById("preview-expenses");
    const previewBalance = document.getElementById("preview-balance");

    function updatePreview() {
        const income = parseFloat(incomeInput.value) || 0;
        const expenses = parseFloat(expensesInput.value) || 0;
        const balance = income - expenses;

        previewIncome.textContent = income.toFixed(2);
        previewExpenses.textContent = expenses.toFixed(2);
        previewBalance.textContent = balance.toFixed(2);

        if (balance >= 0) {
            previewBalance.style.color = "green";
        } else {
            previewBalance.style.color = "red";
        }
    }

    incomeInput.addEventListener("input", updatePreview);
    expensesInput.addEventListener("input", updatePreview);
</script>

{% endblock %}
