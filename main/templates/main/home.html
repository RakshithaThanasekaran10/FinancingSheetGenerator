{% extends "main/base.html" %}

{% block title %}Finance Sheet Generator{% endblock %}

{% block sidebar %}
<div class="card p-3 shadow-sm">
    <h5 class="mb-3">Input Options</h5>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">MLS Number</label>
            <input type="text"
                   name="mls"
                   class="form-control"
                   placeholder="Enter MLS number"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Mortgage Rate (%)</label>
            <input type="number"
                   step="0.01"
                   name="rate"
                   id="rate"
                   class="form-control"
                   placeholder="Enter mortgage rate"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Property Picture</label>
            <input type="file"
                   name="property_pic"
                   id="property-pic"
                   class="form-control"
                   accept="image/*">
        </div>

        <button type="submit" class="btn btn-primary w-100">
            Generate Financing Sheet PDF
        </button>
    </form>
</div>
{% endblock %}

{% block content %}
<div class="card p-4 shadow-sm">
    <h5 class="mb-3">Live Financing Preview</h5>

    <table class="table">
        <thead>
            <tr>
                <th>Field</th>
                <th>Preview</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>MLS Number</td>
                <td><span id="preview-mls"></span></td>
            </tr>
            <tr>
                <td>Mortgage Rate (%)</td>
                <td><span id="preview-rate">0.00</span></td>
            </tr>
            <tr>
                <td>Property Picture</td>
                <td>
                    <img id="preview-pic" src="#" alt="Property Preview" style="max-width: 200px; display: none;">
                </td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    const mlsInput = document.querySelector("input[name='mls']");
    const rateInput = document.getElementById("rate");
    const picInput = document.getElementById("property-pic");

    const previewMLS = document.getElementById("preview-mls");
    const previewRate = document.getElementById("preview-rate");
    const previewPic = document.getElementById("preview-pic");

    function updatePreview() {
        previewMLS.textContent = mlsInput.value;

        const rate = parseFloat(rateInput.value) || 0;
        previewRate.textContent = rate.toFixed(2);

        if (picInput.files && picInput.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                previewPic.src = e.target.result;
                previewPic.style.display = 'block';
            }
            reader.readAsDataURL(picInput.files[0]);
        } else {
            previewPic.style.display = 'none';
        }
    }

    mlsInput.addEventListener("input", updatePreview);
    rateInput.addEventListener("input", updatePreview);
    picInput.addEventListener("change", updatePreview);
</script>
{% endblock %}
