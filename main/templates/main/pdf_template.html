<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        h2 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        .balance {
            font-weight: bold;
        }
    </style>
</head>

<body>

<h2>Finance Sheet</h2>

<table>
    <tr>
        <th>Category</th>
        <th>Amount</th>
    </tr>

    <tr>
        <td>Income</td>
        <td>${{ income }}</td>
    </tr>

    <tr>
        <td>Expenses</td>
        <td>${{ expenses }}</td>
    </tr>

    <tr class="balance">
        <td>Balance</td>
        <td>${{ balance }}</td>
    </tr>

</table>

<script>
    window.onload = function() {
        window.print();
    };
</script>

</body>
</html>
