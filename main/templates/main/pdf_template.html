<!DOCTYPE html>
<html>
<head>
<style>

body {
    font-family: Arial;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    border: 1px solid black;
    padding: 8px;
}

th {
    background-color: #dddddd;
}

</style>
</head>

<body>

<h2>Finance Sheet</h2>

<table>
<tr>
<th>Category</th>
<th>Amount</th>
</tr>

<tr>
<td>Income</td>
<td>${{ income }}</td>
</tr>

<tr>
<td>Expenses</td>
<td>${{ expenses }}</td>
</tr>

<tr>
<td><b>Balance</b></td>
<td><b>${{ balance }}</b></td>
</tr>

</table>

</body>
</html>
